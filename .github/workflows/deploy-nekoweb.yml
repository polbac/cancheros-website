# Deploy automático a Nekoweb en cada push a main.
# https://github.com/marketplace/actions/deploy-to-nekoweb
#
# Secrets (Settings → Secrets and variables → Actions):
#   NEKOWEB_API_KEY   — API key de Nekoweb
#   NEKOWEB_PAGENAME  — usuario exacto en nekoweb.org (ver https://nekoweb.org/api/site/info/TU_USUARIO)

name: Deploy to Nekoweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verificar sitio Nekoweb
        env:
          NEKOWEB_PAGENAME: ${{ secrets.NEKOWEB_PAGENAME }}
        run: |
          if [ -z "$NEKOWEB_PAGENAME" ]; then
            echo "::error::Falta el secret NEKOWEB_PAGENAME (tu usuario en nekoweb.org)."
            exit 1
          fi
          HTTP=$(curl -sS -o /tmp/nekoweb-site.json -w "%{http_code}" \
            "https://nekoweb.org/api/site/info/${NEKOWEB_PAGENAME}")
          if [ "$HTTP" != "200" ]; then
            echo "::error::No existe un sitio Nekoweb para el usuario «${NEKOWEB_PAGENAME}» (HTTP ${HTTP}). Revisá el secret NEKOWEB_PAGENAME."
            cat /tmp/nekoweb-site.json || true
            exit 1
          fi
          echo "Sitio encontrado en nekoweb.org."

      - name: Prepare build
        run: |
          mkdir -p ./build
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.cursor/' \
            --exclude 'scripts/' \
            --exclude 'fonts/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'SITE.md' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            ./ ./build/
          echo "Archivos a desplegar: $(find ./build -type f | wc -l)"
          du -sh ./build

      - name: Deploy to Nekoweb
        uses: mp-pinheiro/nekoweb-deploy@0.2.8
        with:
          API_KEY: ${{ secrets.NEKOWEB_API_KEY }}
          BUILD_DIR: "./build"
          DEPLOY_DIR: "/"
          NEKOWEB_PAGENAME: ${{ secrets.NEKOWEB_PAGENAME }}
          CLEANUP: "False"
          DELAY: "1"
          RETRY_ATTEMPTS: "10"
          RETRY_DELAY: "2"
          RETRY_EXP_BACKOFF: "true"
          DEBUG: "true"
