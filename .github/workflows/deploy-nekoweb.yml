# Deploy automático a Nekoweb en cada push a main.
# https://github.com/marketplace/actions/deploy-to-nekoweb
#
# Secrets (Settings → Secrets and variables → Actions):
#   NEKOWEB_API_KEY   — API key de Nekoweb
#   NEKOWEB_PAGENAME  — subdominio en nekoweb.org (ej. cancheros → cancheros.nekoweb.org)

name: Deploy to Nekoweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verificar sitio Nekoweb
        id: nekoweb
        env:
          NEKOWEB_PAGENAME: ${{ secrets.NEKOWEB_PAGENAME }}
        run: |
          if [ -z "$NEKOWEB_PAGENAME" ]; then
            echo "::error::Falta el secret NEKOWEB_PAGENAME (ej. cancheros para cancheros.nekoweb.org)."
            exit 1
          fi
          PAGE="${NEKOWEB_PAGENAME#https://}"
          PAGE="${PAGE#http://}"
          PAGE="${PAGE%.nekoweb.org}"
          PAGE="${PAGE%%/*}"
          PAGE="$(echo "$PAGE" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -L "https://${PAGE}.nekoweb.org/")
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "301" ] && [ "$HTTP" != "302" ]; then
            echo "::error::No responde https://${PAGE}.nekoweb.org/ (HTTP ${HTTP}). Revisá NEKOWEB_PAGENAME (solo el subdominio, ej. cancheros)."
            exit 1
          fi
          echo "Sitio OK: https://${PAGE}.nekoweb.org/"
          echo "pagename=${PAGE}" >> "$GITHUB_OUTPUT"

      - name: Probar API key
        env:
          NEKOWEB_API_KEY: ${{ secrets.NEKOWEB_API_KEY }}
        run: |
          CODE=$(curl -sS -o /tmp/nekoweb-api.txt -w "%{http_code}" \
            -H "Authorization: ${NEKOWEB_API_KEY}" \
            "https://nekoweb.org/api/files/readfolder?pathname=/")
          if [ "$CODE" != "200" ]; then
            echo "::error::NEKOWEB_API_KEY rechazada (HTTP ${CODE}). Generá una key nueva en Nekoweb → API."
            cat /tmp/nekoweb-api.txt || true
            exit 1
          fi
          echo "API key OK."

      - name: Limpiar file_states remoto
        env:
          NEKOWEB_API_KEY: ${{ secrets.NEKOWEB_API_KEY }}
        run: |
          curl -sS -X POST "https://nekoweb.org/api/files/delete" \
            -H "Authorization: ${NEKOWEB_API_KEY}" \
            --data-urlencode "pathname=/_file_states" \
            -o /tmp/delete-states.txt -w "HTTP %{http_code}\n" || true
          cat /tmp/delete-states.txt || true

      - name: Prepare build
        run: |
          mkdir -p ./build
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.cursor/' \
            --exclude 'scripts/' \
            --exclude 'fonts/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'SITE.md' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            ./ ./build/
          echo "Archivos a desplegar: $(find ./build -type f | wc -l)"
          du -sh ./build

      - name: Deploy to Nekoweb
        uses: mp-pinheiro/nekoweb-deploy@0.2.8
        with:
          API_KEY: ${{ secrets.NEKOWEB_API_KEY }}
          BUILD_DIR: "${{ github.workspace }}/build"
          DEPLOY_DIR: "/"
          NEKOWEB_PAGENAME: ${{ steps.nekoweb.outputs.pagename }}
          CLEANUP: "False"
          DELAY: "1"
          RETRY_ATTEMPTS: "10"
          RETRY_DELAY: "2"
